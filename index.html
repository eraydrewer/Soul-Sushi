```html
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoulSushi</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#0d0d0d;
    color:white;
}

.login-box,
.app{
    width:700px;
    margin:40px auto;
    background:#151515;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 30px rgba(255,140,0,0.3);
}

h1{
    text-align:center;
    color:orange;
}

input{
    width:96%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    font-size:16px;
}

button{
    background:orange;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
    font-size:15px;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

.item{
    background:#222;
    margin-top:12px;
    padding:15px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.total{
    margin-top:20px;
    font-size:22px;
    color:orange;
}

.category{
    margin-top:30px;
    color:orange;
    font-size:22px;
}

.order-list{
    margin-top:20px;
    background:#1d1d1d;
    padding:15px;
    border-radius:10px;
}

</style>
</head>
<body>

<div class="login-box" id="loginBox">

    <h1>🍣 SoulSushi Login</h1>

    <input type="text" id="username" placeholder="Benutzername">

    <input type="password" id="password" placeholder="Passwort">

    <button onclick="login()">Einloggen</button>

</div>

<div class="app" id="app" style="display:none;">

    <h1>🍣 SoulSushi Menü</h1>

    <div id="menu"></div>

    <div class="order-list">
        <h2>Bestellung</h2>
        <div id="orders"></div>
    </div>

    <div class="total" id="total">
        Gesamt: $0
    </div>

    <button onclick="finishOrder()">Bestellung abschließen</button>

</div>

<script>

const USERNAME = "Mitarbeiter";
const PASSWORD = "Soulsushi67";

const menu = {

    "Sushi": [
        {name:"Nigiri Sushi", price:120},
        {name:"Maki Sushi", price:140},
        {name:"Sashimi Sushi", price:180},
        {name:"Chirashi Sushi", price:200},
        {name:"Inari Sushi", price:130}
    ],

    "Hauptspeise": [
        {name:"Rahmen", price:220},
        {name:"Kugelfisch", price:500},
        {name:"Bento", price:250},
        {name:"Tempura", price:300}
    ],

    "Getränke": [
        {name:"Grüntee", price:40},
        {name:"Lychee", price:60},
        {name:"Wasser", price:20},
        {name:"Sake", price:120}
    ]

};

let selected = [];

function login(){

    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if(user === USERNAME && pass === PASSWORD){

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("app").style.display = "block";

        renderMenu();

    }else{
        alert("Falscher Login!");
    }
}

function renderMenu(){

    const menuDiv = document.getElementById("menu");

    for(let category in menu){

        const title = document.createElement("div");
        title.className = "category";
        title.innerHTML = category;

        menuDiv.appendChild(title);

        menu[category].forEach(item => {

            const div = document.createElement("div");

            div.className = "item";

            div.innerHTML = `
                <span>${item.name} - $${item.price}</span>
                <button onclick="addItem('${item.name}', ${item.price})">
                    Hinzufügen
                </button>
            `;

            menuDiv.appendChild(div);

        });
    }
}

function addItem(name, price){

    const found = selected.find(i => i.name === name);

    if(found){

        found.amount++;

    }else{

        selected.push({
            name:name,
            price:price,
            amount:1
        });
    }

    updateOrder();
}

function updateOrder(){

    const orders = document.getElementById("orders");

    orders.innerHTML = "";

    let total = 0;

    selected.forEach(item => {

        total += item.price * item.amount;

        const div = document.createElement("div");

        div.innerHTML = `
            ${item.name} x${item.amount}
            = $${item.price * item.amount}
        `;

        orders.appendChild(div);

    });

    document.getElementById("total").innerHTML =
        "Gesamt: $" + total;
}

function finishOrder(){

    alert("Bestellung erfolgreich erstellt!");

    selected = [];

    updateOrder();
}

</script>

</body>
</html>
