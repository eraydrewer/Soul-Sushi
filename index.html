<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoulSushi</title>

<style>

:root{

    --jade:#39c4aa;
    --jade-dark:#2d9d89;

    --bg:#090b0d;

    --card:#16191d;

    --card2:#1d2126;

    --border:#273038;

    --text:#ffffff;

    --text2:#9ca8b5;

}

body{

    margin:0;

    padding:35px;

    font-family:Segoe UI, Arial, sans-serif;

    background:

    radial-gradient(circle at top,#11241f 0%,#090b0d 40%),

    #090b0d;

    color:var(--text);

}

.login-box,
.app{

    width:1650px;

    margin:auto;

    background:#111418;

    border:1px solid #233039;

    border-radius:22px;

    padding:28px;

    box-shadow:

    0 0 80px rgba(0,0,0,.5),

    inset 0 0 0 1px rgba(255,255,255,.03);

}

h1{

    text-align:center;

    color:white;

    font-size:52px;

    letter-spacing:4px;

    margin-bottom:0;

}

input{

    width:520px;

    height:55px;

    padding:0 18px;

    display:block;

    margin:18px auto;

    background:#1b1f23;

    border:1px solid #303840;

    border-radius:12px;

    color:white;

    font-size:18px;

}

button{
    background:linear-gradient(180deg,#39c4aa,#2d9d89);
    border:1px solid rgba(255,255,255,.12);
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    margin-top:0;
    font-size:14px;
    font-weight:700;
    color:white;
    box-shadow:0 0 18px rgba(57,196,170,.25);
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 25px rgba(57,196,170,.45);
}

.item{
    background:#1b1f23;
    border:1px solid #293138;
    border-radius:18px;
    padding:18px;
    margin-top:14px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    gap:18px;

    min-height:92px;

    transition:.25s;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
}

.item:hover{

    transform:translateY(-2px);

    border-color:#39c4aa;

    box-shadow:
    0 0 18px rgba(57,196,170,.15);

}

.total{
    margin-top:20px;
    font-size:22px;
    color:#39c4aa;
}

.category{
    margin-top:30px;
    color:#39c4aa;
    font-size:22px;
}

.order-list{

    margin-top:25px;

    background:#15191d;

    border:1px solid #273038;

    border-radius:18px;

    padding:22px;

}

.categories{
    display:flex;
    gap:20px;
    justify-content:space-between;
}

.category-box{
    width:31%;
}

.quantity-input{

    width:70px;

    height:42px;

    font-size:16px;

    text-align:center;

    background:#111418;

    border:1px solid #2c343c;

    border-radius:10px;

    color:white;

    padding:0;

}

.action-box{
    display:flex;
    align-items:center;
}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:40px;

}

.header-logo{

display:flex;

align-items:center;

gap:20px;

}

.header-logo img{

width:90px;

height:90px;

border-radius:50%;

}

.header-logo h1{

margin:0;

font-size:58px;

letter-spacing:3px;

}

.header-logo span{

color:#39c4aa;

}

.header-logo p{

margin:0;

letter-spacing:12px;

color:#aab4be;

font-size:18px;

}

.header-right{

display:flex;

gap:20px;

}

.status-box,
.timer-box{

background:#1b2025;

border:1px solid #273038;

padding:15px 22px;

border-radius:18px;

min-width:180px;

text-align:center;

}

.status-box small,
.timer-box small{

display:block;

color:#8f9aa4;

margin-bottom:8px;

}

#status{

color:#39c4aa;

font-weight:bold;

}

#timer{

font-size:26px;

font-weight:bold;

color:white;

}

.discount-buttons button{

    width:70px;

    height:42px;

    font-size:18px;

    font-weight:700;

    border-radius:12px;

    background:transparent;

    color:#39c4aa;

    border:2px solid #39c4aa;

    box-shadow:none;

    transition:.2s;

}

.discount-buttons button:hover{

    background:#39c4aa;

    color:white;

    transform:translateY(-2px);

}

.discount-buttons button{
    background:transparent;
    color:#39c4aa;
    border:1px solid #39c4aa;
    box-shadow:none;
}

.active-discount{
    background:#39c4aa !important;
    color:white !important;
}

.remove-btn{
    background:red;
    color:white;
    border:none;
    border-radius:6px;
    padding:5px 10px;
    cursor:pointer;
    font-size:12px;
}

    .product-info{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.product-name{

    font-size:19px;

    font-weight:600;

    line-height:1.25;

    white-space:normal;

    word-break:break-word;

}
.product-price{
    font-size:15px;
    color:#9fb0bd;
}

    .product-left{
    display:flex;
    align-items:center;
    gap:16px;

    flex:1;
    min-width:0;
}

.product-image{
    width:58px;
    height:58px;
    object-fit:contain;
    flex-shrink:0;
}

.product-info{
    flex:1;
    min-width:0;
}

    .item{
    min-height:72px;
    gap:12px;
}

.product-left{
    flex:1;
    min-width:0;
}

.product-info{
    min-width:0;
}

.product-name{
    line-height:1.2;
}

.action-box{

    display:flex;

    align-items:center;

    gap:12px;

    flex-shrink:0;

}

.add-btn{

    width:135px;

    height:42px;

    font-size:14px;

    border-radius:10px;

    display:flex;

    align-items:center;

    justify-content:center;

    white-space:nowrap;

    flex-shrink:0;

}

    .checkout-panel{
    margin-top:30px;
    display:grid;
    grid-template-columns:2fr 1fr 1fr;
    gap:18px;
    align-items:stretch;
}

.checkout-card,
.total-card{
    background:#15191d;
    border:1px solid #273038;
    border-radius:18px;
    padding:22px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);
}

.checkout-title{
    color:white;
    font-size:20px;
    font-weight:700;
    margin-bottom:14px;
}

.orders-box{
    color:#cfd8dc;
    min-height:55px;
}

.total-card{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.total-card span{
    color:#8f9aa4;
    font-size:13px;
    letter-spacing:3px;
}

.total-card #total{
    color:#39c4aa;
    font-size:34px;
    font-weight:800;
    margin-top:8px;
}

.finish-btn{
    font-size:16px;
    border-radius:18px;
}

    .order-item{

display:flex;

justify-content:space-between;

align-items:center;

padding:12px 0;

border-bottom:1px solid #252b31;

}

.order-left{

display:flex;

gap:10px;

align-items:center;

}

.order-right{

display:flex;

gap:12px;

align-items:center;

}

.order-name{

font-weight:600;

}

.order-qty{

color:#8ea2ad;

}

.order-price{

color:#39c4aa;

font-weight:bold;

}

.remove-btn{

width:32px;

height:32px;

border-radius:50%;

background:#ff4d4d;

display:flex;

align-items:center;

justify-content:center;

padding:0;

font-size:14px;

}

    .app{
    position:relative;
    overflow:hidden;
}

.header,
.categories,
.checkout-panel{
    position:relative;
    z-index:1;
}

.header-logo img{
    box-shadow:0 0 35px rgba(57,196,170,.45);
}

.header-logo::before{
    content:"";
    position:absolute;
    width:190px;
    height:190px;
    background:radial-gradient(circle, rgba(57,196,170,.35), transparent 70%);
    filter:blur(20px);
    z-index:-1;
}

    .app{
    position:relative;
    overflow:hidden;
    background:
        linear-gradient(180deg, rgba(8,18,18,.96), rgba(10,13,16,.98)),
        #0b0f12;
}

.app::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:0;
    background:
        radial-gradient(circle at 50% 0%, rgba(57,196,170,.16), transparent 22%),
        radial-gradient(circle at 0% 0%, rgba(57,196,170,.10), transparent 18%),
        radial-gradient(circle at 100% 0%, rgba(57,196,170,.10), transparent 18%);
}

    .app::after{
    display:none;
}

.header,
.categories,
.checkout-panel{
    position:relative;
    z-index:1;
}

    .login-header{

    display:flex;
    align-items:center;
    justify-content:center;
    gap:25px;

    margin-bottom:35px;

}

.login-logo{

    width:95px;
    height:95px;
    border-radius:50%;

    object-fit:cover;

    box-shadow:0 0 30px rgba(57,196,170,.45);

}

.login-header h1{

    margin:0;

    font-size:52px;

    text-align:left;

}

.login-header p{

    margin-top:8px;

    color:#7f8b95;

    letter-spacing:8px;

    font-size:14px;

}

    .login-box button{

    display:block;

    margin:25px auto 0;

    width:220px;

    height:58px;

    font-size:18px;

    border-radius:14px;

}

    .login-banner{

    margin-top:45px;

    display:flex;

    justify-content:center;

}

.login-banner img{

    width:900px;

    max-width:95%;

    border-radius:18px;

    border:1px solid #2b383e;

    box-shadow:
        0 0 35px rgba(0,0,0,.45);

}
    
</style>
</head>
<body>

<div class="login-box" id="loginBox">

   <div class="login-header">

    <img src="image.png" class="login-logo">

    <div>

        <h1>SoulSushi Login</h1>

        <p>MITARBEITERBEREICH</p>

    </div>

</div>

    <input type="text" id="username" placeholder="Benutzername">

    <input type="password" id="password" placeholder="Passwort">

    <button onclick="login()">Einloggen</button>

    <div class="login-banner">

    <img src="images/login-banner.png.png" alt="Soul Sushi">

</div>

</div>

<div class="app" id="app" style="display:none;">

  <div class="header">

    <div class="header-logo">

        <img src="image.png">

        <div>

            <h1>SOUL<span>SUSHI</span></h1>

            <p>MENU</p>

        </div>

    </div>

    <div class="header-right">

        <div class="status-box">

            <small>EINGELOGGT</small>

            <div id="status">
                Eray Drewer
            </div>

        </div>

        <div class="timer-box">

            <small>VERBLEIBEND</small>

            <div id="timer">
                01:00:00
            </div>

        </div>

    </div>

</div>

    <div class="categories" id="menu"></div>

   <div class="checkout-panel">

    <div class="checkout-card">
        <div class="checkout-title">📋 Bestellung</div>
        <div id="orders" class="orders-box"></div>
    </div>

    <div class="checkout-card">
        <div class="checkout-title">🏷 Rabatt</div>

        <div class="discount-buttons">
            <button onclick="setDiscount(15, this)">15%</button>
            <button onclick="setDiscount(25, this)">25%</button>
            <button onclick="setDiscount(30, this)">30%</button>
            <button onclick="setDiscount(45, this)">45%</button>
            <button onclick="setDiscount(50, this)">50%</button>
        </div>
    </div>

    <div class="total-card">
        <span>GESAMT</span>
        <div id="total"> $0</div>
    </div>

    <button class="finish-btn" onclick="finishOrder()">
        Bestellung abschließen
    </button>

</div>

<script>

const USERS = {
    "Eray Drewer": "MDC10",
    "Santino Dantonio": "Reich67",
    "Robin August": "September45",
    "Enzo Falcone": "Bronze1",
    "Jack Onail": "Fortnite459",
    "Hans Weez": "Adler589",
    "Coco Diaz": "Uhr741",
    "Thiago Lee": "Kissen864",
    "James Balla": "Abc583",
    "Nixadov Alberto": "Handy583",
    "Nico Weber": "Soul558",
    "Vito Kimler": "Sushi542",
    "Lasse Schmidt": "Lasse869",
    "Benedikt Maurer": "Maurer721",
   
};

let currentEmployee = "";
const menu = {

    "Sushi": [
        {name:"Nigiri Sushi", price:375},
        {name:"Maki Sushi", price:300},
        {name:"Sashimi Sushi", price:375},
        {name:"Chirashi Sushi", price:300},
        {name:"Inari Sushi", price:390}
    ],

    "Nachspeise": [
        {name:"Schokoerdbeere", price:250},
        {name:"Mochi", price:160}
       
    
    ],

    "Hauptspeise": [
        {name:"Rahmen", price:300},
        {name:"Okonomiyaki", price:375},
        {name:"Hühnchennudeln", price:375},
        {name:"Donburi", price:300},
        
        
    ],

    "Getränke": [
        {name:"Grüntee", price:180},
        {name:"Litschi Limo", price:300},
        {name:"Bananensaft", price:150},
        {name:"Ingwer Limo", price:210}
    ],


     "sommeraktion": [
        {name:"Softeis schokolade", price:150},
        {name:"Softeis Erdbeere", price:150},
        {name:"Softeis Vanille", price:150}
    ]
         
};

   const productImages = {

    "Nigiri Sushi":"images/nigiri.png.png",
    "Maki Sushi":"images/maki.png.png",
    "Sashimi Sushi":"images/sign (1).png.png",
    "Chirashi Sushi":"images/ChirashiSushi.png.png",
    "Inari Sushi":"images/inari-maki.png.png.png",

    "Rahmen":"images/ramen.png.png",
    "Okonomiyaki":"images/okonomiyaki (1).png.png",
    "Hühnchennudeln":"images/noodles.png.png",
    "Donburi":"images/donburi.png.png",

    "Grüntee":"images/green-tea.png.png",
    "Litschi Limo":"images/lychee.png.png",
    "Bananensaft":"images/banana-smoothie.png.png",
    "Ingwer Limo":"images/oolong.png.png",

    "Schokoerdbeere":"images/strawberry.png.png",
    "Mochi":"images/mochi.png.png",

    "Softeis schokolade":"images/ice-cream.png.png",
    "Softeis Erdbeere":"images/ice-cream.png.png",
    "Softeis Vanille":"images/ice-cream.png.png"

};

let selected = [];

let timeLeft = 3600;
let timerInterval;

let currentDiscount = 0;

function login(){

    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if(USERS[user] && USERS[user] === pass){

    currentEmployee = user;

    document.getElementById("status").innerHTML =
    `🟢 Eingeloggt: ${currentEmployee}`;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";

    renderMenu();
    startTimer();

}else{
        alert("Falscher Login!");
    }
}

function startTimer(){

    clearInterval(timerInterval);

    timeLeft = 3600;

    updateTimer();

    timerInterval = setInterval(() => {

        timeLeft--;

        updateTimer();

        if(timeLeft <= 0){

            clearInterval(timerInterval);

            alert("Session abgelaufen! Du wurdest ausgeloggt.");

            logout();
        }

    }, 1000);
}

function updateTimer(){

    const hours = String(Math.floor(timeLeft / 3600)).padStart(2, '0');

    const minutes = String(Math.floor((timeLeft % 3600) / 60)).padStart(2, '0');

    const seconds = String(timeLeft % 60).padStart(2, '0');

    document.getElementById("timer").innerHTML =
        `${hours}:${minutes}:${seconds}`;
}

function logout(){

    document.getElementById("app").style.display = "none";

    document.getElementById("loginBox").style.display = "block";

    selected = [];

    updateOrder();
}

function renderMenu(){

    const menuDiv = document.getElementById("menu");
    menuDiv.innerHTML = "";

    function createItem(item){
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `

<div class="product-left">

    <img
        src="${productImages[item.name]}"
        class="product-image"
        alt="${item.name}"
    >

    <div class="product-info">

        <div class="product-name">
            ${item.name}
        </div>

        <div class="product-price">
            $${item.price}
        </div>

    </div>

</div>

<div class="action-box">

    <input
        type="number"
        min="0"
        value="0"
        id="${item.name}-qty"
        class="quantity-input"
    >

    <button class="add-btn"
        onclick="addItem('${item.name}', ${item.price})">

        + Hinzufügen

    </button>

</div>

`;

        return div;
    }

    const sushiBox = document.createElement("div");
    sushiBox.className = "category-box";

    const sushiTitle = document.createElement("div");
    sushiTitle.className = "category";
    sushiTitle.innerHTML = "Sushi";
    sushiBox.appendChild(sushiTitle);

    menu["Sushi"].forEach(item => {
        sushiBox.appendChild(createItem(item));
    });

    const dessertTitle = document.createElement("div");
    dessertTitle.className = "category";
    dessertTitle.innerHTML = "Nachspeise";
    sushiBox.appendChild(dessertTitle);

    menu["Nachspeise"].forEach(item => {
        sushiBox.appendChild(createItem(item));
    });

    menuDiv.appendChild(sushiBox);

    ["Hauptspeise", "Getränke"].forEach(category => {

        const categoryBox = document.createElement("div");
        categoryBox.className = "category-box";

        const title = document.createElement("div");
        title.className = "category";
        title.innerHTML = category;
        categoryBox.appendChild(title);

        menu[category].forEach(item => {
            categoryBox.appendChild(createItem(item));
        });

        if(category === "Hauptspeise"){

            const sommerTitle = document.createElement("div");
            sommerTitle.className = "category";
            sommerTitle.innerHTML = "Sommeraktion";
            categoryBox.appendChild(sommerTitle);

            menu["sommeraktion"].forEach(item => {
                categoryBox.appendChild(createItem(item));
            });
        }

        menuDiv.appendChild(categoryBox);
    });
}

function addItem(name, price){

    const qtyInput = document.getElementById(name + "-qty");

    const qty = parseInt(qtyInput.value);

    if(isNaN(qty) || qty <= 0){
        alert("Bitte eine Menge größer als 0 eingeben.");
        return;
    }

    const found = selected.find(i => i.name === name);

    if(found){

        found.amount += qty;

    }else{

        selected.push({
            name: name,
            price: price,
            amount: qty
        });
    }

    qtyInput.value = 0;

    updateOrder();
}

function removeItem(name){

    selected = selected.filter(item => item.name !== name);

    const qtyInput =
        document.getElementById(name + "-qty");

    if(qtyInput){
        qtyInput.value = 0;
    }

    updateOrder();
}

function setDiscount(percent, button){

    if(currentDiscount === percent){

        currentDiscount = 0;

        button.classList.remove('active-discount');

        updateOrder();

        return;
    }

    currentDiscount = percent;

    document.querySelectorAll('.discount-buttons button')
    .forEach(btn => {
        btn.classList.remove('active-discount');
    });

    button.classList.add('active-discount');

    updateOrder();
}

function updateOrder(){

    const orders = document.getElementById("orders");

    orders.innerHTML = "";

    let total = 0;

    selected.forEach(item => {

        total += item.price * item.amount;

       const div = document.createElement("div");

div.className = "order-item";

div.innerHTML = `

<div class="order-left">

    <div>

        <div class="order-name">
            ${item.name}
        </div>

        <div class="order-qty">
            x${item.amount}
        </div>

    </div>

</div>

<div class="order-right">

    <div class="order-price">
        $${item.price * item.amount}
    </div>

    <button class="remove-btn"
        onclick="removeItem('${item.name}')">

        ✕

    </button>

</div>

`;

        orders.appendChild(div);

    });

    const discountAmount =
        total * (currentDiscount / 100);

    total = total - discountAmount;

    if(total < 0){
        total = 0;
    }

  document.getElementById("total").innerHTML =
    "€" + Math.round(total);
}

function finishOrder(){

    let total = 0;
    let orderText = "";

    selected.forEach(item => {
        total += item.price * item.amount;

        orderText += `${item.name} x${item.amount} = $${item.price * item.amount}\n`;
    });

    const discountAmount = total * (currentDiscount / 100);
    total = total - discountAmount;

    if(total < 0) total = 0;

    const webhook = "https://discordapp.com/api/webhooks/1517721854809342222/-URchBn7bkaHkmRuZzQ5ztiwV1ISPzNJQvQuLeheCXZuUNo0W-4nuh4WSLjuaoiJMgCS";

    fetch(webhook, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            embeds: [{
                title: "🍣 Neue SoulSushi Bestellung",
                color: 16753920,
                fields: [
                    {
                        name: "👨‍🍳 Mitarbeiter",
                        value: currentEmployee,
                        inline: true
                    },
                    {
                        name: "📋 Bestellung",
                        value: orderText || "Keine Bestellung"
                    },
                    {
                        name: "🏷 Rabatt",
                        value: currentDiscount + "%",
                        inline: true
                    },
                    {
                        name: "💰 Gesamt",
                        value: "$" + Math.round(total),
                        inline: true
                    }
                ],
                footer: {
                    text: "SoulSushi System"
                },
                timestamp: new Date().toISOString()
            }]
        })
    });

    // Reset
    selected = [];
    currentDiscount = 0;

    document.querySelectorAll('.discount-buttons button')
    .forEach(btn => btn.classList.remove('active-discount'));

    updateOrder();

    document.querySelectorAll('.quantity-input').forEach(input => {
        input.value = 0;
    });
}

</script>

</body>
</html>
