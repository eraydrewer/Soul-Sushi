<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoulSushi</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#0d0d0d;
    color:white;
}

.login-box,
.app{
    width:1200px;
    margin:40px auto;
    background:#151515;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 30px rgba(255,140,0,0.3);
}

h1{
    text-align:center;
    color:orange;
}

input{
    width:96%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    font-size:16px;
}

button{
    background:orange;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
    font-size:15px;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

.item{
    background:#222;
    margin-top:12px;
    padding:15px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.total{
    margin-top:20px;
    font-size:22px;
    color:orange;
}

.category{
    margin-top:30px;
    color:orange;
    font-size:22px;
}

.order-list{
    margin-top:20px;
    background:#1d1d1d;
    padding:15px;
    border-radius:10px;
}

.categories{
    display:flex;
    gap:20px;
    justify-content:space-between;
    flex-wrap:wrap;
}

.category-box{
    width:23%;
}

.quantity-input{
    width:60px;
    padding:8px;
    margin-right:10px;
    text-align:center;
}

.action-box{
    display:flex;
    align-items:center;
}

.top-bar{
    display:flex;
    justify-content:flex-end;
    margin-bottom:15px;
}

.timer{
    background:#222;
    padding:10px 20px;
    border-radius:10px;
    color:orange;
    font-size:18px;
    font-weight:bold;
}

</style>
</head>
<body>

<div class="login-box" id="loginBox">

    <h1>🍣 SoulSushi Login</h1>

    <input type="text" id="username" placeholder="Benutzername">

    <input type="password" id="password" placeholder="Passwort">

    <button onclick="login()">Einloggen</button>

</div>

<div class="app" id="app" style="display:none;">

    <div class="top-bar">
        <div class="timer" id="timer">
            01:00:00
        </div>
    </div>

    <h1>🍣 SoulSushi Menü</h1>

    <div class="categories" id="menu"></div>

    <div class="order-list">
        <h2>Bestellung</h2>
        <div id="orders"></div>
    </div>

    <div class="total" id="total">
        Gesamt: $0
    </div>

    <button onclick="finishOrder()">Bestellung abschließen</button>

</div>

<script>

const USERNAME = "Mitarbeiter";
const PASSWORD = "Soulsushi67";

const menu = {

    "Sushi": [
        {name:"Nigiri Sushi", price:120},
        {name:"Maki Sushi", price:140},
        {name:"Sashimi Sushi", price:180},
        {name:"Chirashi Sushi", price:200},
        {name:"Inari Sushi", price:130}
    ],

    "Nachspeise": [
        {name:"Poki", price:150},
        {name:"Erbeer Mochi", price:90}
    ],

    "Hauptspeise": [
        {name:"Rahmen", price:220},
        {name:"Kugelfisch", price:500},
        {name:"Bento", price:250},
        {name:"Tempura", price:300}
    ],

    "Getränke": [
        {name:"Grüntee", price:40},
        {name:"Lychee", price:60},
        {name:"Wasser", price:20},
        {name:"Sake", price:120}
    ]

};

let selected = [];

let timeLeft = 3600;
let timerInterval;

function login(){

    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if(user === USERNAME && pass === PASSWORD){

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("app").style.display = "block";

        renderMenu();

        startTimer();

    }else{
        alert("Falscher Login!");
    }
}

function startTimer(){

    clearInterval(timerInterval);

    timeLeft = 3600;

    updateTimer();

    timerInterval = setInterval(() => {

        timeLeft--;

        updateTimer();

        if(timeLeft <= 0){

            clearInterval(timerInterval);

            alert("Session abgelaufen! Du wurdest ausgeloggt.");

            logout();
        }

    }, 1000);
}

function updateTimer(){

    const hours = String(Math.floor(timeLeft / 3600)).padStart(2, '0');

    const minutes = String(Math.floor((timeLeft % 3600) / 60)).padStart(2, '0');

    const seconds = String(timeLeft % 60).padStart(2, '0');

    document.getElementById("timer").innerHTML =
        `${hours}:${minutes}:${seconds}`;
}

function logout(){

    document.getElementById("app").style.display = "none";

    document.getElementById("loginBox").style.display = "block";

    selected = [];

    updateOrder();
}

function renderMenu(){

    const menuDiv = document.getElementById("menu");

    menuDiv.innerHTML = "";

    for(let category in menu){

        const categoryBox = document.createElement("div");
        categoryBox.className = "category-box";

        const title = document.createElement("div");
        title.className = "category";
        title.innerHTML = category;

        categoryBox.appendChild(title);

        menu[category].forEach((item, index) => {

            const div = document.createElement("div");

            div.className = "item";

            div.innerHTML = `
                <span>${item.name} - $${item.price}</span>

                <div class="action-box">

                    <input
                        type="number"
                        min="1"
                        value="0"
                        id="${item.name}-qty"
                        class="quantity-input"
                    >

                    <button onclick="addItem('${item.name}', ${item.price})">
                        Hinzufügen
                    </button>

                </div>
            `;

            categoryBox.appendChild(div);

        });

        menuDiv.appendChild(categoryBox);
    }
}

function addItem(name, price){

    const qtyInput =
        document.getElementById(name + "-qty");

    qtyInput.value = parseInt(qtyInput.value) + 1;

    const found = selected.find(i => i.name === name);

    if(found){

        found.amount += 1;

    }else{

        selected.push({
            name:name,
            price:price,
            amount:1
        });
    }

    updateOrder();
}

function updateOrder(){

    const orders = document.getElementById("orders");

    orders.innerHTML = "";

    let total = 0;

    selected.forEach(item => {

        total += item.price * item.amount;

        const div = document.createElement("div");

        div.innerHTML = `
            ${item.name} x${item.amount}
            = $${item.price * item.amount}
        `;

        orders.appendChild(div);

    });

    document.getElementById("total").innerHTML =
        "Gesamt: $" + total;
}

function finishOrder(){

    alert("Bestellung erfolgreich erstellt!");

    selected = [];

    updateOrder();

    document.querySelectorAll('.quantity-input').forEach(input => {
        input.value = 0;
    });
}

</script>

</body>
</html>
